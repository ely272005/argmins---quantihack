<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexical Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0ede8;
    --muted: #7a7875;
    --accent: #c8b89a;
    --accent2: #8fa8c8;
    --accent3: #a8c8a0;
    --danger: #c87a7a;
    --font-display: 'DM Serif Display', serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    min-height: 100vh;
    line-height: 1.6;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 3rem 1.5rem;
    display: flex;
    align-items: flex-end;
    gap: 2rem;
  }

  .site-title {
    font-family: var(--font-display);
    font-size: 2rem;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .site-title em { font-style: italic; color: var(--accent); }

  .site-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding-bottom: 3px;
  }

  main { padding: 2rem 3rem; max-width: 1100px; }

  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 2rem;
    align-items: center;
  }

  .word-input {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 15px;
    padding: 10px 16px;
    width: 280px;
    outline: none;
    transition: border-color 0.15s;
  }

  .word-input:focus { border-color: var(--accent); }
  .word-input::placeholder { color: var(--muted); }

  .add-btn {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px 18px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s, border-color 0.15s;
  }

  .add-btn:hover { background: var(--surface); border-color: var(--accent); }
  .add-btn:disabled { opacity: 0.4; cursor: default; }

  .clear-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px 14px;
    cursor: pointer;
    transition: color 0.15s;
  }

  .clear-btn:hover { color: var(--danger); }

  .range-row {
    display: flex;
    gap: 24px;
    margin-bottom: 1.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .range-group { display: flex; align-items: center; gap: 8px; }

  .range-label {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .range-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 5px 10px;
    width: 70px;
    outline: none;
    text-align: center;
  }

  .range-input:focus { border-color: var(--accent); }

  .chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
    min-height: 28px;
  }

  .chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px 4px 12px;
    border-radius: 3px;
    font-size: 12px;
    border: 1px solid;
    letter-spacing: 0.03em;
  }

  .chip-remove {
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0.5;
    font-size: 14px;
    line-height: 1;
    padding: 0;
    transition: opacity 0.15s;
  }
  .chip-remove:hover { opacity: 1; }

  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    position: relative;
    min-height: 340px;
  }

  .chart-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
  }

  .chart-placeholder .big {
    font-family: var(--font-display);
    font-size: 1.4rem;
    color: var(--border2);
  }

  canvas { display: block; width: 100% !important; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    font-family: var(--font-display);
  }

  .stat-word {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-style: italic;
  }

  .status-bar {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
    height: 20px;
    margin-bottom: 1rem;
  }

  .loading-dot {
    display: inline-block;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .note {
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 1rem;
    margin-top: 1rem;
    letter-spacing: 0.03em;
  }

  .proxy-banner {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 10px 16px;
    margin-bottom: 1.5rem;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .proxy-banner input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 10px;
    width: 320px;
    outline: none;
  }

  .proxy-banner input:focus { border-color: var(--accent); }

  .proxy-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .proxy-dot.ok { background: var(--accent3); }
  .proxy-dot.err { background: var(--danger); }
</style>
</head>
<body>

<header>
  <div>
    <div class="site-title">Lexical <em>Explorer</em></div>
  </div>
  <div class="site-sub">Word frequency over time &mdash; Google Books Ngrams</div>
</header>

<main>

  <div class="proxy-banner">
    <div class="proxy-dot" id="proxyDot"></div>
    <span>proxy url:</span>
    <input id="proxyUrl" type="text" value="https://YOUR-APP.onrender.com" placeholder="https://your-app.onrender.com" />
    <button class="add-btn" style="font-size:11px; padding:4px 12px;" onclick="checkProxy()">connect</button>
    <span id="proxyStatus">not connected</span>
  </div>

  <div class="search-row">
    <input class="word-input" id="wordInput" type="text" placeholder="type a word..." maxlength="60" />
    <button class="add-btn" id="addBtn" onclick="addWord()">+ add word</button>
    <button class="clear-btn" onclick="clearAll()">clear all</button>
  </div>

  <div class="range-row">
    <div class="range-group">
      <span class="range-label">from</span>
      <input class="range-input" id="yearStart" type="number" value="1800" min="1800" max="2019" />
    </div>
    <div class="range-group">
      <span class="range-label">to</span>
      <input class="range-input" id="yearEnd" type="number" value="2019" min="1800" max="2019" />
    </div>
    <button class="add-btn" onclick="refreshAll()" style="font-size:11px;">refresh range</button>
  </div>

  <div class="chips" id="chips"></div>
  <div class="status-bar" id="status"></div>

  <div class="chart-wrap">
    <div class="chart-placeholder" id="placeholder">
      <div class="big">no words yet</div>
      <div>connect your proxy above, then type a word</div>
    </div>
    <canvas id="myChart" style="display:none;"></canvas>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="note">
    data: google books ngrams corpus (english, 1800&ndash;2019) &mdash; values are relative frequency &mdash; proxy hosted on render.com
  </div>

</main>

<script>
const COLORS = [
  { line: '#c8b89a', bg: 'rgba(200,184,154,0.08)' },
  { line: '#8fa8c8', bg: 'rgba(143,168,200,0.08)' },
  { line: '#a8c8a0', bg: 'rgba(168,200,160,0.08)' },
  { line: '#c8a0a0', bg: 'rgba(200,160,160,0.08)' },
  { line: '#b8a8d8', bg: 'rgba(184,168,216,0.08)' },
  { line: '#d8c8a0', bg: 'rgba(216,200,160,0.08)' },
];

const cache = {};
let words = [];
let chartInstance = null;
let proxyOk = false;

const wordInput = document.getElementById('wordInput');
const addBtn = document.getElementById('addBtn');
const status = document.getElementById('status');

wordInput.addEventListener('keydown', e => { if (e.key === 'Enter') addWord(); });

function getProxy() {
  return document.getElementById('proxyUrl').value.trim().replace(/\/$/, '');
}

async function checkProxy() {
  const dot = document.getElementById('proxyDot');
  const st = document.getElementById('proxyStatus');
  dot.className = 'proxy-dot';
  st.textContent = 'checking...';
  try {
    const res = await fetch(`${getProxy()}/health`);
    const data = await res.json();
    if (data.ok) {
      dot.className = 'proxy-dot ok';
      st.textContent = 'connected';
      proxyOk = true;
    } else throw new Error();
  } catch {
    dot.className = 'proxy-dot err';
    st.textContent = 'failed — check url';
    proxyOk = false;
  }
}

function setStatus(msg, loading = false) {
  status.innerHTML = loading
    ? `<span class="loading-dot">●</span> ${msg}`
    : msg;
}

async function fetchWord(word) {
  const w = word.trim().toLowerCase();
  if (!w) return null;
  const ys = document.getElementById('yearStart').value;
  const ye = document.getElementById('yearEnd').value;
  const key = `${w}__${ys}__${ye}`;
  if (cache[key]) return cache[key];

  const url = `${getProxy()}/ngrams?content=${encodeURIComponent(w)}&year_start=${ys}&year_end=${ye}`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (!data || data.length === 0) return null;
    const ts = data[0].timeseries;
    const startYear = parseInt(ys);
    const result = ts.map((v, i) => ({ year: startYear + i, freq: v }));
    cache[key] = result;
    return result;
  } catch {
    return null;
  }
}

async function addWord() {
  if (!proxyOk) {
    setStatus('connect your proxy first');
    return;
  }
  const raw = wordInput.value.trim().toLowerCase();
  if (!raw) return;
  if (words.find(w => w.word === raw)) {
    wordInput.value = '';
    setStatus(`"${raw}" is already on the chart`);
    return;
  }
  if (words.length >= 6) {
    setStatus('max 6 words at a time');
    return;
  }

  addBtn.disabled = true;
  setStatus(`fetching "${raw}"...`, true);

  const data = await fetchWord(raw);

  if (!data) {
    setStatus(`no data found for "${raw}" — try another word`);
    addBtn.disabled = false;
    return;
  }

  const colorIdx = words.length % COLORS.length;
  words.push({ word: raw, data, color: COLORS[colorIdx] });
  wordInput.value = '';
  renderChips();
  renderChart();
  renderStats();
  setStatus('');
  addBtn.disabled = false;
}

async function refreshAll() {
  if (words.length === 0) return;
  const current = words.map(w => w.word);
  words = [];
  Object.keys(cache).forEach(k => delete cache[k]);
  setStatus('refreshing...', true);
  for (let i = 0; i < current.length; i++) {
    const data = await fetchWord(current[i]);
    if (data) words.push({ word: current[i], data, color: COLORS[i % COLORS.length] });
  }
  renderChips();
  renderChart();
  renderStats();
  setStatus('');
}

function removeWord(word) {
  words = words.filter(w => w.word !== word);
  words.forEach((w, i) => w.color = COLORS[i % COLORS.length]);
  renderChips();
  renderChart();
  renderStats();
}

function clearAll() {
  words = [];
  renderChips();
  renderChart();
  renderStats();
  setStatus('');
}

function renderChips() {
  const chips = document.getElementById('chips');
  chips.innerHTML = words.map(w => `
    <div class="chip" style="color:${w.color.line}; border-color:${w.color.line}33; background:${w.color.bg}">
      ${w.word}
      <button class="chip-remove" onclick="removeWord('${w.word}')" style="color:${w.color.line}">×</button>
    </div>
  `).join('');
}

function renderChart() {
  const placeholder = document.getElementById('placeholder');
  const canvas = document.getElementById('myChart');

  if (words.length === 0) {
    placeholder.style.display = 'flex';
    canvas.style.display = 'none';
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    return;
  }

  placeholder.style.display = 'none';
  canvas.style.display = 'block';

  const datasets = words.map(w => ({
    label: w.word,
    data: w.data.map(d => ({ x: d.year, y: d.freq })),
    borderColor: w.color.line,
    backgroundColor: w.color.bg,
    borderWidth: 1.5,
    pointRadius: 0,
    pointHoverRadius: 4,
    pointHoverBackgroundColor: w.color.line,
    fill: true,
    tension: 0.3,
  }));

  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(canvas, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: 2.8,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e1e21',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: '#f0ede8',
          bodyColor: '#7a7875',
          titleFont: { family: 'DM Mono', size: 12 },
          bodyFont: { family: 'DM Mono', size: 11 },
          callbacks: {
            title: items => `${items[0].parsed.x}`,
            label: item => ` ${item.dataset.label}: ${item.parsed.y.toExponential(3)}`
          }
        }
      },
      scales: {
        x: {
          type: 'linear',
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: '#7a7875',
            font: { family: 'DM Mono', size: 11 },
            maxTicksLimit: 12,
            callback: v => Math.round(v),
          },
          border: { color: 'rgba(255,255,255,0.07)' }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: '#7a7875',
            font: { family: 'DM Mono', size: 10 },
            maxTicksLimit: 6,
            callback: v => v.toExponential(1),
          },
          border: { color: 'rgba(255,255,255,0.07)' }
        }
      }
    }
  });
}

function renderStats() {
  const row = document.getElementById('statsRow');
  if (words.length === 0) { row.innerHTML = ''; return; }

  let peakWord = null, peakVal = 0, peakYear = 0;
  let risingWord = null, risingVal = -Infinity;

  words.forEach(w => {
    const freqs = w.data.map(d => d.freq);
    const max = Math.max(...freqs);
    const maxIdx = freqs.indexOf(max);
    if (max > peakVal) { peakVal = max; peakWord = w.word; peakYear = w.data[maxIdx].year; }
    const last10 = freqs.slice(-10);
    const first10 = freqs.slice(0, 10);
    const avgLast = last10.reduce((a,b) => a+b,0)/last10.length;
    const avgFirst = first10.reduce((a,b) => a+b,0)/first10.length;
    const growth = avgFirst > 0 ? (avgLast - avgFirst)/avgFirst : avgLast;
    if (growth > risingVal) { risingVal = growth; risingWord = w.word; }
  });

  row.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">words on chart</div>
      <div class="stat-value">${words.length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">highest peak</div>
      <div class="stat-value">${peakYear}</div>
      <div class="stat-word">${peakWord}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">most rising</div>
      <div class="stat-value">${risingWord}</div>
      <div class="stat-word">vs. start of range</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">data range</div>
      <div class="stat-value">${document.getElementById('yearStart').value}–${document.getElementById('yearEnd').value}</div>
    </div>
  `;
}
</script>
</body>
</html>
